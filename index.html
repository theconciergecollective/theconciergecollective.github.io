<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>The Concierge Collective | Surgical & Recovery Support</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="The Concierge Collective provides high-touch coordination, logistical support, and curated recommendations for surgeons, recovery accommodations, and licensed after-care providers based on each client’s needs and preferences." />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#050507;--bg-soft:#111018;--bg-elevated:#181621;--gold:#bfa76a;--offwhite:#f5f2f7;--muted:#9a93a5;--border-subtle:rgba(255,255,255,0.06);--shadow-soft:0 24px 60px rgba(0,0,0,0.65);--radius-lg:22px;--radius-pill:999px;--transition:220ms ease;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Montserrat",sans-serif;background:radial-gradient(circle at top,#1b1824 0,#050507 55%);color:var(--offwhite);}
a{text-decoration:none;color:inherit;}
.page{min-height:100vh;display:flex;flex-direction:column;padding:28px 20px 60px;}
@media(min-width:900px){.page{padding:32px 60px 80px;}}
header{max-width:1120px;margin:0 auto 32px;}
.nav{display:flex;justify-content:space-between;align-items:center;}
.logo-text{font-family:"Cormorant Garamond",serif;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);}
.logo-text span{color:var(--offwhite);}
.nav-links{display:flex;gap:22px;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
.nav-links a{position:relative;padding-bottom:4px;}
.nav-links a::after{content:"";position:absolute;left:0;bottom:0;width:0;height:1px;background:var(--gold);transition:width var(--transition);}
.nav-links a:hover::after{width:100%;}
.btn{border-radius:var(--radius-pill);padding:9px 18px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;border:1px solid var(--gold);color:var(--gold);background:transparent;cursor:pointer;transition:var(--transition);}
.btn:hover{background:var(--gold);color:#050507;}
.btn-primary{background:var(--gold);color:#050507;}
main{flex:1;max-width:1120px;margin:0 auto;display:flex;flex-direction:column;gap:40px;}
.hero{display:grid;gap:28px;}
@media(min-width:900px){.hero{grid-template-columns:1.4fr 1.1fr;}}
.hero-copy{padding:26px 22px;border-radius:var(--radius-lg);background:rgba(10,9,16,.96);border:1px solid var(--border-subtle);box-shadow:var(--shadow-soft);display:flex;flex-direction:column;gap:18px;}
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
.hero-title{font-family:"Cormorant Garamond",serif;font-size:32px;line-height:1.15;}
@media(min-width:900px){.hero-title{font-size:40px;}}
.hero-title span{color:var(--gold);}
.hero-subtitle{font-size:14px;line-height:1.7;color:var(--muted);max-width:520px;}
.hero-subtitle strong{color:var(--offwhite);}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;}
.hero-meta{display:flex;gap:18px;flex-wrap:wrap;font-size:11px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;}
.hero-panel{border-radius:var(--radius-lg);background:#111018;border:1px solid var(--border-subtle);padding:20px;display:flex;flex-direction:column;gap:14px;}
.hero-panel-title{font-family:"Cormorant Garamond",serif;font-size:20px;}
.hero-panel-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));font-size:12px;}
.chip{border-radius:999px;border:1px solid rgba(255,255,255,.08);padding:8px 11px;background:rgba(255,255,255,.02);color:var(--muted);display:flex;gap:8px;align-items:center;}
.chip span{width:6px;height:6px;border-radius:999px;background:var(--gold);}
section{border-radius:var(--radius-lg);background:#0a0910f5;border:1px solid var(--border-subtle);padding:22px 18px;box-shadow:var(--shadow-soft);}
