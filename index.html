:root{--bg:#050507;--gold:#bfa76a;--off:#f5f2f7;--muted:#9a93a5;--border:rgba(255,255,255,0.06);--shadow:0 24px 60px rgba(0,0,0,0.65);--r:22px;--pill:999px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Montserrat",sans-serif;background:radial-gradient(circle at top,#1b1824 0%,#050507 55%);color:var(--off);}
a{text-decoration:none;color:inherit;}
.page{min-height:100vh;display:flex;flex-direction:column;padding:28px 20px 60px;}
@media(min-width:900px){.page{padding:32px 60px 80px;}}
header{max-width:1120px;margin:0 auto 32px;text-align:center;}
.nav{display:flex;flex-direction:column;align-items:center;gap:14px;}
.logo-text{font-family:"Cormorant Garamond",serif;font-size:18px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);}
.nav-links{display:flex;gap:22px;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);align-items:center;}
.nav-links a:hover{color:var(--gold);}
.ig-link{color:var(--gold);font-weight:500;}
.btn{border-radius:var(--pill);padding:9px 18px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;border:1px solid var(--gold);color:var(--gold);background:transparent;transition:.2s;}
.btn:hover{background:var(--gold);color:#050507;}
.btn-primary{background:var(--gold);color:#050507;}
main{flex:1;max-width:1120px;margin:0 auto;display:flex;flex-direction:column;gap:40px;}
section{border-radius:var(--r);background:#0a0910f5;border:1px solid var(--border);padding:22px 18px;box-shadow:var(--shadow);}
.hero{display:grid;gap:28px;}
@media(min-width:900px){.hero{grid-template-columns:1.4fr 1.1fr;}}
.hero-copy{padding:26px 22px;border-radius:var(--r);background:rgba(10,9,16,0.96);border:1px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:18px;}
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
.hero-title{font-family:"Cormorant Garamond",serif;font-size:32px;line-height:1.15;}
@media(min-width:900px){.hero-title{font-size:40px;}}
.hero-title span{color:var(--gold);}
.hero-subtitle{font-size:14px;line-height:1.7;color:var(--muted);}
.hero-subtitle strong{color:var(--off);}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;}
.hero-meta{display:flex;gap:18px;flex-wrap:wrap;font-size:11px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;}
.hero-panel{border-radius:var(--r);background:#111018;border:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:14px;}
.hero-panel-title{font-family:"Cormorant Garamond",serif;font-size:20px;}
.hero-panel-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));font-size:12px;}
.chip{border-radius:999px;border:1px solid rgba(255,255,255,0.08);padding:8px 11px;background:rgba(255,255,255,0.02);color:var(--muted);display:flex;gap:8px;align-items:center;}
.chip span{width:6px;height:6px;border-radius:999px;background:var(--gold);}
.section-header{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
.section-title{font-family:"Cormorant Garamond",serif;font-size:22px;}
.section-kicker{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
.gold-divider{border:0;border-top:1px solid var(--gold);width:60px;margin:0 auto 18px;}
