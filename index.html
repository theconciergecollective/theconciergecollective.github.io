<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Concierge Collective | Surgical & Recovery Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="The Concierge Collective provides high-touch coordination, logistical support, and curated recommendations for surgeons, recovery accommodations, and licensed after-care providers based on each client’s needs and preferences." />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050507;
      --bg-soft: #111018;
      --bg-elevated: #181621;
      --gold: #bfa76a;
      --offwhite: #f5f2f7;
      --mauve: #b89abf;
      --muted: #9a93a5;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --shadow-soft: 0 24px 60px rgba(0, 0, 0, 0.65);
      --radius-lg: 22px;
      --radius-pill: 999px;
      --transition: 220ms ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Montserrat", system-ui, sans-serif;
      background: radial-gradient(circle at top, #1b1824 0, #050507 55%);
      color: var(--offwhite);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .page { min-height: 100vh; display: flex; flex-direction: column; padding: 28px 20px 60px; }
    @media (min-width: 900px) { .page { padding: 32px 60px 80px; } }

    header { max-width: 1120px; margin: 0 auto 32px; }
    .nav { display: flex; align-items: center; justify-content: space-between; gap: 24px; }

    .logo-text {
      font-family: "Cormorant Garamond", serif;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 13px;
      color: var(--gold);
      white-space: nowrap;
    }
    .logo-text span { color: var(--offwhite); font-weight: 400; }

    .nav-links {
      display: flex; align-items: center; gap: 22px;
      font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted);
    }
    .nav-links a { position: relative; padding-bottom: 4px; }
    .nav-links a::after {
      content: ""; position: absolute; left: 0; bottom: 0; width: 0; height: 1px;
      background: var(--gold); transition: width var(--transition);
    }
    .nav-links a:hover::after { width: 100%; }

    .btn {
      border-radius: var(--radius-pill);
      padding: 9px 18px;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--gold);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: background var(--transition), color var(--transition), transform var(--transition);
    }
    .btn:hover { background: var(--gold); color: #050507; transform: translateY(-1px); }
    .btn-primary { background: var(--gold); color: #050507; border-color: var(--gold); }
    .btn-primary:hover { background: #d1b87a; border-color: #d1b87a; }

    main { flex: 1; max-width: 1120px; margin: 0 auto; display: flex; flex-direction: column; gap: 40px; }

    /* HERO */
    .hero { display: grid; grid-template-columns: minmax(0, 1.4fr); gap: 28px; }
    @media (min-width: 900px) {
      .hero { grid-template-columns: minmax(0, 1.4fr) minmax(0, 1.1fr); align-items: stretch; }
    }

    .hero-copy {
      padding: 26px 22px;
      border-radius: var(--radius-lg);
      background: radial-gradient(circle at top left, rgba(191, 167, 106, 0.12), transparent 55%), rgba(10, 9, 16, 0.96);
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-soft);
      display: flex; flex-direction: column; gap: 18px;
    }

    .eyebrow {
      font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted);
    }

    .hero-title {
      font-family: "Cormorant Garamond", serif;
      font-size: 32px; line-height: 1.15; font-weight: 500;
    }
    @media (min-width: 900px) { .hero-title { font-size: 40px; } }
    .hero-title span { color: var(--gold); }

    .hero-subtitle {
      font-size: 14px; line-height: 1.7; color: var(--muted); max-width: 520px;
    }
    .hero-subtitle strong { color: var(--offwhite); font-weight: 500; }

    .hero-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 4px; }
    .hero-meta {
      display: flex; flex-wrap: wrap; gap: 18px; margin-top: 10px;
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted);
    }
    .hero-meta span { color: var(--offwhite); }

    .hero-panel {
      border-radius: var(--radius-lg);
      background: linear-gradient(145deg, #151320, #090812);
      border: 1px solid var(--border-subtle);
      padding: 20px 18px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .hero-panel-title {
      font-family: "Cormorant Garamond", serif;
      font-size: 20px; font-weight: 500; color: var(--offwhite);
    }

    .hero-panel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; font-size: 12px;
    }

    .chip {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 8px 11px;
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255, 255, 255, 0.02);
      color: var(--muted);
    }
    .chip span {
      width: 6px; height: 6px; border-radius: 999px; background: var(--gold);
    }

    /* Sections */
    section {
      border-radius: var(--radius-lg);
      background: rgba(10, 9, 16, 0.96);
      border: 1px solid var(--border-subtle);
      padding: 22px 18px;
      box-shadow: var(--shadow-soft);
    }
    @media (min-width: 900px) { section { padding: 26px 24px; } }

    .section-header {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 16px; margin-bottom: 18px;
    }

    .section-title {
      font-family: "Cormorant Garamond", serif;
      font-size: 22px; font-weight: 500;
    }

    .section-kicker {
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted);
    }

    .section-body {
      font-size: 14px; line-height: 1.7; color: var(--muted);
      display: grid; gap: 18px;
    }

    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .pill {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 6px 10px;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
    }

    /* Services grid */
    .services-grid {
      display: grid; grid-template-columns: minmax(0, 1.2fr); gap: 16px;
    }
    @media (min-width: 900px) {
      .services-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    .service-card {
      border-radius: 18px;
      background: linear-gradient(145deg, #151320, #0b0a12);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 16px 14px;
      display: flex; flex-direction: column; gap: 8px;
      font-size: 13px;
    }

    .service-label {
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted);
    }

    .service-title {
      font-family: "Cormorant Garamond", serif;
      font-size: 18px; font-weight: 500; color: var(--offwhite);
    }

    .service-body { font-size: 13px; line-height: 1.7; color: var(--muted); }
    .service-meta { margin-top: 6px; font-size: 11px; color: var(--muted); }

    /* Journey */
    .journey-grid {
      display: grid; grid-template-columns: minmax(0, 1.2fr); gap: 16px;
    }
    @media (min-width: 900px) {
      .journey-grid { grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr); }
    }

    .timeline { display: grid; gap: 12px; font-size: 13px; }

    .timeline-step {
      display: grid; grid-template-columns: auto minmax(0, 1fr);
      gap: 10px; align-items: flex-start;
    }

    .timeline-marker {
      width: 18px; height: 18px; border-radius: 999px;
      border: 1px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--gold); margin-top: 3px;
    }

    .timeline-content-title {
      font-family: "Cormorant Garamond", serif;
      font-size: 16px; margin-bottom: 2px;
    }

    .journey-side {
      border-radius: 18px;
      background: radial-gradient(circle at top, rgba(191, 167, 106, 0.12), transparent 55%), #111018;
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 16px 14px;
      font-size: 13px;
      display: grid; gap: 10px;
    }

    /* Contact */
    .contact-grid {
      display: grid; grid-template-columns: minmax(0, 1.2fr); gap: 16px;
    }
    @media (min-width: 900px) {
      .contact-grid { grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr); }
    }

      font-size
